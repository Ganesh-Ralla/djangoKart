{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ecommerce</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header class=" p-4 bg-green-500 text-white  fixed z-10 top-0 w-full">
        <nav class="flex items-center justify-between px-12">
            <a href="{% url 'home' %}" class=" text-2xl font-bold">DjangoKart</a>
            <div class="flex items-center gap-4">
                <a class="hover:font-bold" href="{% url 'home' %}">Home</a>
                <a class="hover:font-bold" href="{% url 'product' %}">Products</a>
                <a class="hover:font-bold" href="{% url 'cart' %}">Cart</a>
                {% if request.user.is_authenticated %}
                <a class="hover:font-bold" href="{% url 'profile' %}">Profile</a>
                {% else %}
                <a class="hover:font-bold" href="{% url 'login' %}">Login</a>
                {% endif%}
            </div>
        </nav>
    </header>
    <main class=" mt-16 p-4">
        <div class=" border border-gray-200 rounded-xl p-4">
            <p>Order Summary</p>
            <div>

            </div>
        </div>

    </main>
    <footer class="bg-green-600 p-4 text-white">
        <div class="flex items-start justify-between px-12 mb-4">
            <div>
                <p class="text-4xl font-bold">DJANGOKART</p>
                <p>A practice project built while learning Django.</p>
            </div>

            <div class=" flex items-center gap-3">
                <p class="font-bold">Check out more projects</p>
                <a href="https://github.com/Ganesh-Ralla" class="underline">GitHub</a>
            </div>
        </div>
        <hr>
        <div class="text-center mt-4">
            <p>Designed by Ganesh Ralla © 2026</p>
            <p>Made with Django</p>
        </div>
    </footer>
</body>

</html>
